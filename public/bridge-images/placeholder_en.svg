<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE0C8"/>
      <stop offset="100%" stop-color="#E0D0AD"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="60%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#644B23" stop-opacity="0.12"/>
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>
  <rect width="400" height="300" filter="url(#paper)" opacity=".06"/>
  <rect width="400" height="300" fill="url(#vig)"/>

  <g transform="translate(200,120)" fill="none" stroke="#C0A060" stroke-width="1.2" opacity=".45">
    <path d="M-45,0 Q-22,-38 0,-42 Q22,-38 45,0"/>
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <line x1="-55" y1="0" x2="-55" y2="-6"/>
    <line x1="-35" y1="0" x2="-35" y2="-15"/>
    <line x1="-15" y1="0" x2="-15" y2="-20"/>
    <line x1="15" y1="0" x2="15" y2="-20"/>
    <line x1="35" y1="0" x2="35" y2="-15"/>
    <line x1="55" y1="0" x2="55" y2="-6"/>
    <path d="M-55,-6 C-45,-16 -25,-22 -15,-20 C-5,-18 5,-18 15,-20 C25,-22 45,-16 55,-6"/>
    <line x1="-35" y1="0" x2="-35" y2="18"/>
    <line x1="35" y1="0" x2="35" y2="18"/>
    <path d="M-65,18 Q-45,24 -25,18 Q0,12 25,18 Q45,24 65,18" stroke-width=".8"/>
    <path d="M-70,24 Q-50,30 -30,24 Q0,18 30,24 Q50,30 70,24" stroke-width=".5" opacity=".5"/>
  </g>

  <line x1="145" y1="158" x2="255" y2="158" stroke="#C9A34E" stroke-width=".5" opacity=".3"/>
  <text x="200" y="178" text-anchor="middle" font-family="Georgia,'Times New Roman',serif" font-size="12" fill="#B5A080" letter-spacing="3" font-style="italic">No Image Available</text>
  <line x1="155" y1="190" x2="245" y2="190" stroke="#C9A34E" stroke-width=".5" opacity=".2"/>

  <g stroke="#C9A34E" stroke-width=".8" fill="none" opacity=".2">
    <path d="M12,8 L8,8 L8,12"/>
    <path d="M388,8 L392,8 L392,12"/>
    <path d="M12,292 L8,292 L8,288"/>
    <path d="M388,292 L392,292 L392,288"/>
  </g>
  <rect x="6" y="6" width="388" height="288" rx="2" fill="none" stroke="#C9A34E" stroke-width=".4" opacity=".15"/>
